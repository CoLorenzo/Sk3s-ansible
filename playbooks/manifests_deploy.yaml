- name: Deploy Kubernetes manifests on K3s Controllers
  hosts: server
  become: yes
  tasks:
    - name: Ensure that the directory for manifests exists
      ansible.builtin.file:
        path: /var/lib/rancher/k3s/server/manifests/
        state: directory
        mode: '0755'

    - name: Copy all manifests from local files to nodes
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "/var/lib/rancher/k3s/server/manifests/{{ item | basename }}"
        mode: '0644'
      with_fileglob:
        - "../files/manifests/*.yaml"
