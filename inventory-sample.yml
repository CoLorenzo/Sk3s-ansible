k3s_cluster:
  children:
    server:
      hosts: {}
    agent:
      hosts: {}
  vars:
    ansible_port: 22
    ansible_user: debian
    k3s_version: v1.31.12+k3s1
    token: "changeme!"
    api_endpoint: "{{ hostvars[groups['server'][0]]['ansible_host'] | default(groups['server'][0]) }}"
    server_config_yaml: |
      embedded-registry: true
    ansible_python_interpreter: /usr/bin/python3
