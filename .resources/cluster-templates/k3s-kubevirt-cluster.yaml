# k3s workload cluster on KubeVirt VMs — managed by Cluster API
#
# Apply this once to create the cluster:
#   kubectl apply -f .resources/cluster-templates/k3s-kubevirt-cluster.yaml
#
# Add workers at any time (auto-join, no manual steps):
#   sk3s add-machine k3s-kubevirt 1
#   # or directly:
#   kubectl scale machinedeployment k3s-kubevirt-workers --replicas=<n>
#
# Fetch the workload cluster kubeconfig:
#   sk3s get-kubeconfig k3s-kubevirt
#
# What happens when you add a machine:
#   1. CAPI creates a Machine object
#   2. CAPK (KubeVirt provider) creates a VirtualMachine in KubeVirt
#   3. KubeVirt boots the Ubuntu VM
#   4. CAPI k3s bootstrap provider injects cloud-init with the k3s agent
#      join command (server URL + token) into the VM's cloud-init volume
#   5. k3s agent starts and the node appears in the workload cluster
---
# ── Infrastructure ──────────────────────────────────────────────────────────
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubeVirtCluster
metadata:
  name: k3s-kubevirt
  namespace: default
spec:
  controlPlaneServiceTemplate:
    spec:
      type: ClusterIP
---
# ── Cluster ─────────────────────────────────────────────────────────────────
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: k3s-kubevirt
  namespace: default
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - 10.244.0.0/16
    services:
      cidrBlocks:
        - 10.96.0.0/12
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: KubeVirtCluster
    name: k3s-kubevirt
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: KThreesControlPlane
    name: k3s-kubevirt-control-plane
---
# ── Control plane VM template ────────────────────────────────────────────────
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubeVirtMachineTemplate
metadata:
  name: k3s-kubevirt-cp
  namespace: default
spec:
  template:
    spec:
      virtualMachineTemplate:
        spec:
          runStrategy: Always
          dataVolumeTemplates:
            - metadata:
                name: boot
              spec:
                source:
                  registry:
                    url: docker://quay.io/containerdisks/ubuntu:22.04
                storage:
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 10Gi
          domain:
            cpu:
              cores: 2
            memory:
              guest: 4Gi
            devices:
              disks:
                - name: boot
                  disk:
                    bus: virtio
                - name: cloudinit
                  disk:
                    bus: virtio
              interfaces:
                - name: default
                  masquerade: {}
          networks:
            - name: default
              pod: {}
          volumes:
            - name: boot
              dataVolume:
                name: boot
            - name: cloudinit
              cloudInitNoCloud:
                # secretRef.name is filled in by CAPK at machine creation time
                # with the bootstrap secret generated by the k3s bootstrap provider
                secretRef:
                  name: ""
---
# ── Control plane ────────────────────────────────────────────────────────────
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KThreesControlPlane
metadata:
  name: k3s-kubevirt-control-plane
  namespace: default
spec:
  replicas: 1
  version: v1.31.12+k3s1
  infrastructureTemplate:
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: KubeVirtMachineTemplate
    name: k3s-kubevirt-cp
  kthreesConfigSpec:
    serverConfig:
      disableComponents:
        - traefik
        - servicelb
---
# ── Worker bootstrap config ──────────────────────────────────────────────────
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KThreesConfigTemplate
metadata:
  name: k3s-kubevirt-worker-bootstrap
  namespace: default
spec:
  template:
    spec:
      agentConfig: {}
---
# ── Worker VM template ───────────────────────────────────────────────────────
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubeVirtMachineTemplate
metadata:
  name: k3s-kubevirt-worker
  namespace: default
spec:
  template:
    spec:
      virtualMachineTemplate:
        spec:
          runStrategy: Always
          dataVolumeTemplates:
            - metadata:
                name: boot
              spec:
                source:
                  registry:
                    url: docker://quay.io/containerdisks/ubuntu:22.04
                storage:
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 10Gi
          domain:
            cpu:
              cores: 2
            memory:
              guest: 4Gi
            devices:
              disks:
                - name: boot
                  disk:
                    bus: virtio
                - name: cloudinit
                  disk:
                    bus: virtio
              interfaces:
                - name: default
                  masquerade: {}
          networks:
            - name: default
              pod: {}
          volumes:
            - name: boot
              dataVolume:
                name: boot
            - name: cloudinit
              cloudInitNoCloud:
                secretRef:
                  name: ""
---
# ── Worker MachineDeployment — scale this to add nodes ──────────────────────
# kubectl scale machinedeployment k3s-kubevirt-workers --replicas=<n>
# sk3s add-machine k3s-kubevirt <n>
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: k3s-kubevirt-workers
  namespace: default
  labels:
    cluster.x-k8s.io/cluster-name: k3s-kubevirt
spec:
  clusterName: k3s-kubevirt
  replicas: 1
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: k3s-kubevirt
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: k3s-kubevirt
    spec:
      clusterName: k3s-kubevirt
      version: v1.31.12+k3s1
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KThreesConfigTemplate
          name: k3s-kubevirt-worker-bootstrap
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: KubeVirtMachineTemplate
        name: k3s-kubevirt-worker
