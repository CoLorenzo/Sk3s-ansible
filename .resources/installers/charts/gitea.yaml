apiVersion: v1
kind: Namespace
metadata:
  name: gitea
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: gitea
  namespace: kube-system
spec:
  chart: gitea
  version: 10.4.0
  repo: https://dl.gitea.com/charts
  targetNamespace: gitea
  valuesContent: |
    persistence:
      enabled: true
