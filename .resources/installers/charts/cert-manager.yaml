apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
---
# cert-manager is the standard k8s way to obtain Let's Encrypt certificates.
# After install, create a ClusterIssuer pointing to Let's Encrypt ACME.
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cert-manager
  namespace: kube-system
spec:
  chart: cert-manager
  version: 1.14.4
  repo: https://charts.jetstack.io
  targetNamespace: cert-manager
  valuesContent: |
    crds:
      enabled: true
