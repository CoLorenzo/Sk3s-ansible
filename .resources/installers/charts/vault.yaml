apiVersion: v1
kind: Namespace
metadata:
  name: vault
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: vault
  namespace: kube-system
spec:
  chart: vault
  version: 0.27.0
  repo: https://helm.releases.hashicorp.com
  targetNamespace: vault
  valuesContent: |
    server:
      ha:
        enabled: false
      dev:
        enabled: false
