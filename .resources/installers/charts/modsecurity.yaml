apiVersion: v1
kind: Namespace
metadata:
  name: ingress-nginx
---
# ModSecurity is delivered as ingress-nginx with the WAF module enabled
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: modsecurity
  namespace: kube-system
spec:
  chart: ingress-nginx
  version: 4.9.0
  repo: https://kubernetes.github.io/ingress-nginx
  targetNamespace: ingress-nginx
  valuesContent: |
    controller:
      config:
        enable-modsecurity: "true"
        enable-owasp-modsecurity-crs: "true"
        modsecurity-snippet: |
          SecRuleEngine On
