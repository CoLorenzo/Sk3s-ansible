---
- name: Preparing all knots for Longhorn
  hosts: k3s_cluster
  become: true
  tasks:
    - name: Update package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install the required dependencies
      apt:
        name:
          - open-iscsi
          - nfs-common
          - util-linux
          - grep
          - sed
          - curl
          - python3-kubernetes
          - python3-yaml
        state: present

    - name: Make sure the iscsid service is active and enabled
      systemd:
        name: iscsid
        enabled: yes
        state: started

- name: Installing Helm and Longhorn
  hosts: server
  become: true
  tasks:
    - name: Download the Helm installation script
      get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get_helm.sh
        mode: '0700'

    - name: Run the Helm installation script
      command: /tmp/get_helm.sh
      args:
        creates: /usr/local/bin/helm

    - name: Add the Longhorn Helm repository
      kubernetes.core.helm_repository:
        name: longhorn
        repo_url: "https://charts.longhorn.io"

    - name: Create the namespace for Longhorn
      kubernetes.core.k8s:
        name: longhorn-system
        api_version: v1
        kind: Namespace
        state: present

    - name: Install Longhorn via Helm Chart
      kubernetes.core.helm:
        name: longhorn
        chart_ref: longhorn/longhorn
        release_namespace: longhorn-system
        values:
          persistence:
            defaultClass: true
